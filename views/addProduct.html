<main class="dashboard-page d-flex">
    <aside ng-include="'views/shared/sidebar.html'"></aside>

    <section class="dashboard-content">
        <header ng-include="'views/shared/topbar.html'"></header>

        <div class="dashboard-body products-page-content container-fluid">
            <h1 class="products-page-title">Add Product</h1>
            <p class="products-page-subtitle">Create a new item in inventory</p>

            <div class="product-form-wrapper">
                <form ng-submit="saveNewProduct()" class="product-form">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label product-form-label">Name</label>
                            <input type="text" ng-model="myNewProduct.name" class="form-control product-form-input" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label product-form-label">Brand</label>
                            <input type="text" ng-model="myNewProduct.brand" class="form-control product-form-input">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label product-form-label">Category</label>
                            <input type="text" ng-model="myNewProduct.category" class="form-control product-form-input">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label product-form-label">Batch No</label>
                            <input type="text" ng-model="myNewProduct.batch_no" class="form-control product-form-input">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label product-form-label">Barcode</label>
                            <input type="number" ng-model="myNewProduct.barcode" class="form-control product-form-input">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label product-form-label">Expiry Date</label>
                            <input type="date" ng-model="myNewProduct.expiry_date" class="form-control product-form-input" min="{{minExpiryDate}}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label product-form-label">Supplier ID</label>
                            <input type="text" ng-model="myNewProduct.supplier_id" class="form-control product-form-input">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label product-form-label">Supplier Name</label>
                            <input type="text" ng-model="myNewProduct.supplier_name" class="form-control product-form-input">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label product-form-label">Quantity</label>
                            <input type="number" min="1" ng-model="myNewProduct.quantity" class="form-control product-form-input">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label product-form-label">Unit Price</label>
                            <input type="number" step="0.01" ng-model="myNewProduct.unit_price" class="form-control product-form-input">
                        </div>
                    </div>

                    <div class="product-form-actions">
                        <button type="submit" class="primary-action-btn btn">Save Product</button>
                        <a ng-href="#!/products" class="product-cancel-btn btn">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </section>
</main>
