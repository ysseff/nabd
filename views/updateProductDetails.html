<main class="dashboard-page d-flex">
    <aside ng-include="'views/shared/sidebar.html'"></aside>

    <section class="dashboard-content">
        <header ng-include="'views/shared/topbar.html'"></header>

        <div class="dashboard-body products-page-content container-fluid">
            <h1 class="products-page-title">Update Product</h1>
            <p class="products-page-subtitle">Editing {{product.name || 'product'}}</p>

            <div class="product-form-wrapper">
                <form ng-submit="saveProduct()" class="product-form">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label product-form-label">Name</label>
                            <input type="text" ng-model="product.name" class="form-control product-form-input">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label product-form-label">Brand</label>
                            <input type="text" ng-model="product.brand" class="form-control product-form-input">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label product-form-label">Category</label>
                            <input type="text" ng-model="product.category" class="form-control product-form-input">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label product-form-label">Batch No</label>
                            <input type="text" ng-model="product.batch_no" class="form-control product-form-input">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label product-form-label">Expiry Date</label>
                            <input type="date" ng-model="product.expiry_date" class="form-control product-form-input" min="{{minExpiryDate}}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label product-form-label">Quantity</label>
                            <input type="number" min="1" ng-model="product.quantity" class="form-control product-form-input">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label product-form-label">Unit Price</label>
                            <input type="number" step="0.01" ng-model="product.unit_price" class="form-control product-form-input">
                        </div>
                    </div>

                    <div class="product-form-actions">
                        <button type="submit" class="primary-action-btn btn">Save Changes</button>
                        <a ng-href="#!/products" class="product-cancel-btn btn">Back to Products</a>
                    </div>
                </form>
            </div>
        </div>
    </section>
</main>
